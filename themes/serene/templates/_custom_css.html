<style>

  /* light mode colors */
  body {
    --primary-color: #5871a2;
    --primary-pale-color: #5871a233;
    --primary-decoration-color: #5871a210;
    --bg-color: #ffffff;
    --text-color: #2f3030;
    --text-pale-color: #767676;
    --text-decoration-color: #a9a9a9;
    --highlight-mark-color: #5f75b020;

    --callout-note-color: #5871a2;
    --callout-tip-color: #268556;
    --callout-important-color: #885fc9;
    --callout-warning-color: #ab6632;
    --callout-caution-color: #c64e4e;
  }

  /* dark mode colors */
  body.dark {
    --primary-color: #6f8fd1;
    --primary-pale-color: #6f8fd166;
    --primary-decoration-color: #6f8fd112;
    --bg-color: #1c1c1c;
    --text-color: #c1c1c1;
    --text-pale-color: #848484;
    --text-decoration-color: #5f5f5f;
    --highlight-mark-color: #8296cb3b;

    --callout-note-color: #6f8fd1;
    --callout-tip-color: #47976f;
    --callout-important-color: #9776cd;
    --callout-warning-color: #ad7a52;
    --callout-caution-color: #d06161;
  }

  /* typography */
  body {
    --main-font: ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
    --code-font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    
    --default-heading-font: 'Merriweather Sans', sans-serif;
    --default-body-font: 'Crimson Text', serif;
    --default-blockquote-font: 'Merienda', cursive;
    --default-code-font: 'Google Sans Code', monospace;

    --literary-heading-font: 'PT Sans', sans-serif;
    --literary-body-font: 'Gentium Book Plus', serif;
    --literary-blockquote-font: 'Moon Dance', cursive;
    --literary-code-font: 'PT Mono', monospace;

    --modern-heading-font: 'Outfit', sans-serif;
    --modern-body-font: 'Crimson Pro', serif;
    --modern-blockquote-font: 'Moon Dance', cursive;
    --modern-code-font: 'Fira Mono', monospace;

    --classic-heading-font: 'Lato', sans-serif;
    --classic-body-font: 'Gentium Book Plus', serif;
    --classic-blockquote-font: 'Moon Dance', cursive;
    --classic-code-font: 'Overpass Mono', monospace;

    /* Blog post font variables */
    --heading-font: var(--modern-heading-font);
    --body-font: var(--modern-body-font);
    --blockquote-font: var(--modern-blockquote-font);
    --blog-code-font: var(--modern-code-font);

    /* Catppuccin dark theme code colors */
    body.dark {
      --code-bg-color: #1e1e2e;
      --code-border-color: #51465b;
      --code-text-color: #cdd6f4;
      --inline-code-bg-color: #51465b20;

    --main-max-width: 768px;
    --avatar-size: 60px;
    --font-size: 16px;
    --line-height: 1.75;
    --img-border-radius: 0px;
    --detail-border-radius: 0px;
    --dark-mode-img-brightness: 0.75;
    --dark-mode-chart-brightness: 0.75;
    --inline-code-border-radius: 2px;
    --inline-code-bg-color: var(--primary-decoration-color);
    --block-code-border-radius: 0px;
    --block-code-border-color: var(--primary-color);
