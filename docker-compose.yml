services:
  blog:
    build:
      context: .
      target: development
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    environment:
      - JEKYLL_ENV=development
    command: sh -c "bundle exec jekyll serve --host 0.0.0.0 --livereload --force_polling"
    develop:
      watch:
        - path: .
          action: rebuild

  blog-production:
    build:
      context: .
      target: production-serve
    ports:
      - "4001:4000"
    environment:
      - JEKYLL_ENV=production
    profiles:
      - production

volumes:
  bundle_cache: